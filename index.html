<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Velyra</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#9fe3f5;
    overflow:hidden;
}

/* HOME BUTTON */

.home-btn{
    position:fixed;
    top:15px;
    left:15px;
    padding:12px 20px;
    background:#ff914d;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    z-index:999;
}

.home-btn:hover{
    background:#ff7b26;
}

/* SCREENS */

.screen{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.hidden{
    display:none;
}

/* CARD */

.card{
    background:#f5ead7;
    padding:40px;
    border-radius:25px;
    width:500px;
    max-width:90%;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.card h1{
    margin-bottom:25px;
    font-size:42px;
}

/* BUTTONS */

button{
    border:none;
    cursor:pointer;
    transition:0.3s;
}

.main-btn{
    width:100%;
    padding:15px;
    margin-top:12px;
    border-radius:12px;
    background:#35b87f;
    color:white;
    font-size:18px;
}

.main-btn:hover{
    background:#2da56f;
}

/* CHARACTER CREATOR */

.creator-container{
    width:900px;
    max-width:95%;
    background:#f5ead7;
    border-radius:25px;
    padding:30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:30px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.preview-box{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.player{
    position:relative;
    width:180px;
    height:320px;
}

/* HAIR */

.hair{
    position:absolute;
    top:20px;
    left:40px;
    width:100px;
    height:60px;
    background:#3b2414;
    border-radius:50px 50px 20px 20px;
    z-index:3;
}

/* FACE */

.face{
    position:absolute;
    top:50px;
    left:50px;
    width:80px;
    height:90px;
    background:#f1c27d;
    border-radius:45px;
    z-index:2;
}

/* EYES */

.eyes{
    position:absolute;
    top:90px;
    left:72px;
    width:35px;
    height:8px;
    background:black;
    border-radius:10px;
    z-index:4;
}

/* BODY */

.body-part{
    position:absolute;
    top:145px;
    left:45px;
    width:90px;
    height:90px;
    background:#4da6ff;
    border-radius:20px;
}

/* LEGS */

.legs{
    position:absolute;
    top:230px;
    left:55px;
    width:70px;
    height:80px;
    background:#333;
    border-radius:15px;
}

/* OPTIONS */

.options{
    flex:1;
}

.options h2{
    margin-bottom:20px;
}

.option-group{
    margin-bottom:20px;
}

.option-group h3{
    margin-bottom:10px;
}

.option-row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.option-row button{
    padding:10px 15px;
    border-radius:10px;
    background:#ff914d;
    color:white;
    font-weight:bold;
}

.option-row button:hover{
    background:#ff7b26;
}

/* HOUSE */

.house-screen{
    width:100vw;
    height:100vh;
    background:#d9b382;
    position:relative;
}

/* PLAYER */

.game-player{
    width:50px;
    height:70px;
    position:absolute;
    background:#4da6ff;
    border-radius:15px;
    left:150px;
    top:400px;
}

/* DAD */

.dad{
    width:55px;
    height:75px;
    position:absolute;
    background:#35b87f;
    border-radius:15px;
    left:450px;
    top:250px;
}

/* DOOR */

.door{
    width:90px;
    height:140px;
    background:#6b3e26;
    position:absolute;
    right:80px;
    bottom:120px;
    border-radius:10px;
}

/* DIALOG */

.dialog-box{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    width:80%;
    background:white;
    border-radius:20px;
    padding:25px;
    font-size:22px;
    line-height:1.5;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.space-text{
    margin-top:10px;
    color:gray;
    font-size:16px;
}

</style>
</head>

<body>

<!-- HOME BUTTON -->

<button class="home-btn" onclick="goHome()">
Home
</button>

<!-- CHARACTER CREATOR -->

<div class="screen" id="creatorScreen">

    <div class="creator-container">

        <!-- PREVIEW -->

        <div class="preview-box">

            <div class="player">

                <div class="hair" id="hair"></div>

                <div class="face" id="face"></div>

                <div class="eyes"></div>

                <div class="body-part" id="shirt"></div>

                <div class="legs" id="pants"></div>

            </div>

        </div>

        <!-- OPTIONS -->

        <div class="options">

            <h2>Create Character</h2>

            <!-- SKIN -->

            <div class="option-group">

                <h3>Skin Color</h3>

                <div class="option-row">

                    <button onclick="setSkin('#f1c27d')">Light</button>

                    <button onclick="setSkin('#d8a36d')">Tan</button>

                    <button onclick="setSkin('#8d5524')">Dark</button>

                </div>

            </div>

            <!-- HAIR -->

            <div class="option-group">

                <h3>Hair Color</h3>

                <div class="option-row">

                    <button onclick="setHair('#3b2414')">Black</button>

                    <button onclick="setHair('#7a4a28')">Brown</button>

                    <button onclick="setHair('#f5d142')">Blonde</button>

                    <button onclick="setHair('#ff4d4d')">Red</button>

                </div>

            </div>

            <!-- SHIRT -->

            <div class="option-group">

                <h3>Shirt Color</h3>

                <div class="option-row">

                    <button onclick="setShirt('#4da6ff')">Blue</button>

                    <button onclick="setShirt('#ff4d4d')">Red</button>

                    <button onclick="setShirt('#35b87f')">Green</button>

                    <button onclick="setShirt('#a64dff')">Purple</button>

                </div>

            </div>

            <!-- PANTS -->

            <div class="option-group">

                <h3>Pants Color</h3>

                <div class="option-row">

                    <button onclick="setPants('#333')">Black</button>

                    <button onclick="setPants('#1d4ed8')">Blue</button>

                    <button onclick="setPants('#5c4033')">Brown</button>

                </div>

            </div>

            <button class="main-btn" onclick="startGame()">
                Start Adventure
            </button>

        </div>

    </div>

</div>

<!-- HOUSE -->

<div class="screen hidden" id="houseScreen">

    <div class="house-screen">

        <div class="game-player" id="gamePlayer"></div>

        <div class="dad"></div>

        <div class="door"></div>

        <!-- DIALOG -->

        <div class="dialog-box" id="dialogBox">

            <div id="dialogText">
                Hey Player! Are you ready to begin your adventure?<br><br>
                Go visit Professor Harvey in his laboratory to choose your starter pet!
            </div>

            <div class="space-text">
                Press SPACE to continue
            </div>

        </div>

    </div>

</div>

<script>

/* COLORS */

function setSkin(color){

    document.getElementById("face").style.background = color;

}

function setHair(color){

    document.getElementById("hair").style.background = color;

}

function setShirt(color){

    document.getElementById("shirt").style.background = color;

}

function setPants(color){

    document.getElementById("pants").style.background = color;

}

/* START GAME */

function startGame(){

    document.getElementById("creatorScreen").classList.add("hidden");

    document.getElementById("houseScreen").classList.remove("hidden");

}

/* SPACE CLOSES DIALOG */

document.addEventListener("keydown", function(e){

    if(e.code === "Space"){

        let box = document.getElementById("dialogBox");

        box.style.display = "none";

    }

});

/* HOME BUTTON */

function goHome(){

    location.reload();

}

</script>

</body>
</html>
