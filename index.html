<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexar</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#9fe3f5;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:100%;
  max-width:500px;
}

.card{
  background:#f5ead7;
  padding:40px;
  border-radius:20px;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

h1{
  text-align:center;
  font-size:45px;
  margin-bottom:30px;
  color:#333;
}

.top-buttons{
  display:flex;
  gap:10px;
  margin-bottom:25px;
}

.top-buttons button{
  flex:1;
}

input{
  width:100%;
  padding:15px;
  margin-bottom:15px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
}

.main-button{
  background:#35b87f;
  color:white;
  margin-bottom:15px;
}

.main-button:hover{
  background:#2ea16f;
}

.switch-button{
  background:#4da6ff;
  color:white;
}

.switch-button:hover{
  background:#2c8cff;
}

.google{
  background:white;
  color:#333;
  border:2px solid #ddd;
}

.google:hover{
  background:#f1f1f1;
}

.social-title{
  text-align:center;
  margin-bottom:15px;
  color:#555;
}

.hidden{
  display:none;
}

.mode-buttons button,
.grade-buttons button,
.subject-buttons button{
  margin-bottom:12px;
}

</style>
</head>

<body>

<div class="container">

  <!-- LOGIN / SIGNUP SCREEN -->

  <div class="card" id="authScreen">

    <h1>Welcome to Nexar</h1>

    <div class="top-buttons">

      <button class="switch-button" onclick="showLogin()">
        Login
      </button>

      <button class="switch-button" onclick="showSignup()">
        Sign Up
      </button>

    </div>



    <!-- LOGIN FORM -->

    <div id="loginForm">

      <input type="text" id="loginUser" placeholder="Username">

      <input type="password" id="loginPass" placeholder="Password">

      <button class="main-button" onclick="login()">
        Login
      </button>

    </div>



    <!-- SIGNUP FORM -->

    <div id="signupForm" class="hidden">

      <input type="text" id="signupUser" placeholder="Create Username">

      <input type="password" id="signupPass" placeholder="Create Password">

      <button class="main-button" onclick="signup()">
        Sign Up
      </button>

    </div>



    <p class="social-title">
      Continue with Google
    </p>

    <button class="google" onclick="fakeGoogleLogin()">
      Google
    </button>

  </div>



  <!-- MODE SCREEN -->

  <div class="card hidden" id="modeScreen">

    <h1>Choose Mode</h1>

    <div class="mode-buttons">

      <button class="main-button" onclick="showGrade('home')">
        Play At Home
      </button>

      <button class="main-button" onclick="showGrade('school')">
        Play At School
      </button>

    </div>

  </div>



  <!-- GRADE SCREEN -->

  <div class="card hidden" id="gradeScreen">

    <h1>Select Grade</h1>

    <div class="grade-buttons">

      <button class="main-button" onclick="showSubjects()">
        Grade 1
      </button>

      <button class="main-button" onclick="showSubjects()">
        Grade 2
      </button>

      <button class="main-button" onclick="showSubjects()">
        Grade 3
      </button>

      <button class="main-button" onclick="showSubjects()">
        Grade 4
      </button>

      <button class="main-button" onclick="showSubjects()">
        Grade 5
      </button>

      <button class="main-button" onclick="showSubjects()">
        Grade 6
      </button>

    </div>

  </div>



  <!-- SUBJECT SCREEN -->

  <div class="card hidden" id="subjectScreen">

    <h1>Choose Subject</h1>

    <div class="subject-buttons">

      <button class="main-button">
        Math
      </button>

      <button class="main-button">
        English
      </button>

      <button class="main-button">
        Science
      </button>

    </div>

  </div>

</div>



<script>

function showSignup(){

  document.getElementById("loginForm").classList.add("hidden");

  document.getElementById("signupForm").classList.remove("hidden");

}

function showLogin(){

  document.getElementById("signupForm").classList.add("hidden");

  document.getElementById("loginForm").classList.remove("hidden");

}

function signup(){

  let username = document.getElementById("signupUser").value;

  let password = document.getElementById("signupPass").value;

  localStorage.setItem("username", username);

  localStorage.setItem("password", password);

  alert("Account Created!");

}

function login(){

  let username = document.getElementById("loginUser").value;

  let password = document.getElementById("loginPass").value;

  let savedUser = localStorage.getItem("username");

  let savedPass = localStorage.getItem("password");

  if(username === savedUser && password === savedPass){

    showMode();

  } else {

    alert("Wrong username or password");

  }

}

function fakeGoogleLogin(){

  alert("Google Login Coming Soon!");

}

function showMode(){

  document.getElementById("authScreen").classList.add("hidden");

  document.getElementById("modeScreen").classList.remove("hidden");

}

function showGrade(mode){

  document.getElementById("modeScreen").classList.add("hidden");

  document.getElementById("gradeScreen").classList.remove("hidden");

}

function showSubjects(){

  document.getElementById("gradeScreen").classList.add("hidden");

  document.getElementById("subjectScreen").classList.remove("hidden");

}

</script>

</body>
</html>
