<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Velixar</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#9fe3f5;
    overflow:hidden;
}

/* HOME BUTTON */

#homeBtn{
    position:fixed;
    top:15px;
    left:15px;
    padding:10px 18px;
    border:none;
    border-radius:12px;
    background:#ff8c42;
    color:white;
    font-size:18px;
    cursor:pointer;
    z-index:999;
}

#homeBtn:hover{
    background:#ff7420;
}

/* SCREENS */

.screen{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.hidden{
    display:none !important;
}

/* LOGIN */

.card{
    width:420px;
    background:#f5ead7;
    padding:35px;
    border-radius:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card h1{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    cursor:pointer;
}

.main-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#35b87f;
    color:white;
    font-size:18px;
    margin-bottom:12px;
}

.main-btn:hover{
    background:#2d9e6d;
}

.switch-btn{
    background:#4da6ff;
}

.top-buttons{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

/* CHARACTER */

.gender-buttons button,
.outfit-buttons button{
    margin-bottom:12px;
}

/* GAME WORLD */

#gameWorld{
    position:relative;
    width:100vw;
    height:100vh;
    background:#d9b382;
    overflow:hidden;
}

/* PLAYER */

#player{
    width:60px;
    height:90px;
    background:#4da6ff;
    position:absolute;
    left:700px;
    top:420px;
    border-radius:15px;
}

/* DAD */

#dad{
    width:60px;
    height:90px;
    background:#3cb878;
    position:absolute;
    left:350px;
    top:230px;
    border-radius:15px;
}

/* DOOR */

#door{
    width:90px;
    height:120px;
    background:#7b4b20;
    position:absolute;
    right:100px;
    top:220px;
    border-radius:10px;
}

/* DIALOGUE */

#dialogueBox{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    width:80%;
    background:white;
    border-radius:25px;
    padding:30px;
    font-size:24px;
    line-height:1.5;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

#spaceText{
    margin-top:20px;
    font-size:18px;
    color:gray;
}

/* BUTTON GROUPS */

.grade-buttons button,
.mode-buttons button{
    margin-bottom:12px;
}

</style>
</head>

<body>

<!-- HOME BUTTON -->

<button id="homeBtn" class="hidden" onclick="goHome()">
Home
</button>

<!-- LOGIN SCREEN -->

<div class="screen" id="loginScreen">

<div class="card">

<h1>Welcome To Velixar</h1>

<div class="top-buttons">

<button class="main-btn switch-btn" onclick="showLogin()">
Login
</button>

<button class="main-btn switch-btn" onclick="showSignup()">
Sign Up
</button>

</div>

<!-- LOGIN -->

<div id="loginForm">

<input type="text" id="loginUser" placeholder="Username">

<input type="password" id="loginPass" placeholder="Password">

<button class="main-btn" onclick="login()">
Login
</button>

</div>

<!-- SIGNUP -->

<div id="signupForm" class="hidden">

<input type="text" id="signupUser" placeholder="Create Username">

<input type="password" id="signupPass" placeholder="Create Password">

<button class="main-btn" onclick="signup()">
Create Account
</button>

</div>

</div>

</div>

<!-- MODE SCREEN -->

<div class="screen hidden" id="modeScreen">

<div class="card">

<h1>Choose Mode</h1>

<div class="mode-buttons">

<button class="main-btn" onclick="showGrade()">
Play At Home
</button>

<button class="main-btn" onclick="showGrade()">
Play At School
</button>

</div>

</div>

</div>

<!-- GRADE SCREEN -->

<div class="screen hidden" id="gradeScreen">

<div class="card">

<h1>Select Grade</h1>

<div class="grade-buttons">

<button class="main-btn" onclick="showCharacter()">
Grade 1
</button>

<button class="main-btn" onclick="showCharacter()">
Grade 2
</button>

<button class="main-btn" onclick="showCharacter()">
Grade 3
</button>

<button class="main-btn" onclick="showCharacter()">
Grade 4
</button>

<button class="main-btn" onclick="showCharacter()">
Grade 5
</button>

<button class="main-btn" onclick="showCharacter()">
Grade 6
</button>

</div>

</div>

</div>

<!-- CHARACTER SCREEN -->

<div class="screen hidden" id="characterScreen">

<div class="card">

<h1>Create Character</h1>

<h2>Choose Gender</h2>

<div class="gender-buttons">

<button class="main-btn" onclick="chooseGender('boy')">
Boy
</button>

<button class="main-btn" onclick="chooseGender('girl')">
Girl
</button>

</div>

<h2>Choose Outfit</h2>

<div class="outfit-buttons">

<button class="main-btn" onclick="chooseOutfit('blue')">
Blue Outfit
</button>

<button class="main-btn" onclick="chooseOutfit('red')">
Red Outfit
</button>

<button class="main-btn" onclick="startGame()">
Start Adventure
</button>

</div>

</div>

</div>

<!-- GAME -->

<div id="gameWorld" class="hidden">

<div id="dad"></div>

<div id="door"></div>

<div id="player"></div>

<div id="dialogueBox">

<p id="dialogueText">
Hey, player! Are you ready to begin your adventure?<br><br>
Go visit Professor Harvey in his laboratory to choose your starter pet!
</p>

<p id="spaceText">
Press SPACE to continue
</p>

</div>

</div>

<script>

let currentUser = "";

let badWords = [
"fuck",
"bitch",
"shit",
"asshole",
"fucker"
];

/* AUTO LOGIN */

window.onload = function(){

let savedLogin = localStorage.getItem("loggedIn");

if(savedLogin === "true"){

showMode();

}

}

/* LOGIN / SIGNUP */

function showSignup(){

document.getElementById("signupForm").classList.remove("hidden");
document.getElementById("loginForm").classList.add("hidden");

}

function showLogin(){

document.getElementById("loginForm").classList.remove("hidden");
document.getElementById("signupForm").classList.add("hidden");

}

function containsBadWord(text){

text = text.toLowerCase();

for(let i=0;i<badWords.length;i++){

if(text.includes(badWords[i])){

return true;

}

}

return false;

}

function signup(){

let username = document.getElementById("signupUser").value;
let password = document.getElementById("signupPass").value;

if(containsBadWord(username) || containsBadWord(password)){

alert("Inappropriate username or password.");
return;

}

if(localStorage.getItem(username)){

alert("Username already exists.");
return;

}

localStorage.setItem(username, password);

localStorage.setItem("loggedIn", "true");
localStorage.setItem("currentUser", username);

currentUser = username;

showMode();

}

function login(){

let username = document.getElementById("loginUser").value;
let password = document.getElementById("loginPass").value;

let savedPass = localStorage.getItem(username);

if(savedPass === password){

localStorage.setItem("loggedIn", "true");
localStorage.setItem("currentUser", username);

currentUser = username;

showMode();

}else{

alert("Wrong username or password");

}

}

/* MODE */

function showMode(){

hideAll();

document.getElementById("modeScreen").classList.remove("hidden");

}

/* GRADE */

function showGrade(){

hideAll();

document.getElementById("gradeScreen").classList.remove("hidden");

}

/* CHARACTER */

function showCharacter(){

hideAll();

document.getElementById("characterScreen").classList.remove("hidden");

}

function chooseGender(gender){

localStorage.setItem("gender", gender);

}

function chooseOutfit(outfit){

localStorage.setItem("outfit", outfit);

}

/* START GAME */

function startGame(){

hideAll();

document.getElementById("gameWorld").classList.remove("hidden");

/* SHOW HOME BUTTON ONLY IN GAME */

document.getElementById("homeBtn").classList.remove("hidden");

let user = localStorage.getItem("currentUser");

document.getElementById("dialogueText").innerHTML =
"Hey, " + user + "! Are you ready to begin your adventure?<br><br>Go visit Professor Harvey in his laboratory to choose your starter pet!";

}

/* SPACE CLOSES DIALOGUE */

document.addEventListener("keydown", function(e){

if(e.code === "Space"){

document.getElementById("dialogueBox").style.display = "none";

}

});

/* HOME BUTTON */

function goHome(){

localStorage.setItem("loggedIn", "false");

document.getElementById("gameWorld").classList.add("hidden");

document.getElementById("homeBtn").classList.add("hidden");

hideAll();

document.getElementById("loginScreen").classList.remove("hidden");

}

/* HIDE ALL */

function hideAll(){

document.getElementById("loginScreen").classList.add("hidden");
document.getElementById("modeScreen").classList.add("hidden");
document.getElementById("gradeScreen").classList.add("hidden");
document.getElementById("characterScreen").classList.add("hidden");

}

</script>

</body>
</html>
