<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexar</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#9fe3f5;
    overflow:hidden;
}

/* BUTTONS */

button{
    border:none;
    border-radius:12px;
    cursor:pointer;
}

/* HOME BUTTON */

.home-btn{
    position:fixed;
    top:15px;
    left:15px;

    padding:10px 18px;

    background:#ff8c42;
    color:white;

    font-size:16px;

    z-index:1000;
}

.home-btn:hover{
    background:#ff741f;
}

/* CENTER */

.center{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* CARD */

.card{
    background:#f5ead7;
    width:100%;
    max-width:500px;
    padding:40px;
    border-radius:25px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:25px;
    font-size:42px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;

    border:none;
    border-radius:12px;

    font-size:16px;
}

.green{
    width:100%;
    padding:15px;

    background:#35b87f;
    color:white;

    font-size:18px;

    margin-bottom:12px;
}

.blue{
    width:100%;
    padding:15px;

    background:#4da6ff;
    color:white;

    font-size:18px;

    margin-bottom:12px;
}

.top-buttons{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.hidden{
    display:none;
}

/* GAME MAP */

#gameScreen{
    width:100vw;
    height:100vh;

    background:#c89b6d;

    position:relative;
}

/* HOUSE FLOOR */

.house-floor{
    width:100%;
    height:100%;

    background:#deb887;

    position:relative;
}

/* PLAYER */

#player{
    width:60px;
    height:60px;

    background:#4da6ff;

    border-radius:50%;

    position:absolute;

    left:120px;
    top:300px;
}

/* DAD */

#dad{
    width:60px;
    height:60px;

    background:#35b87f;

    border-radius:50%;

    position:absolute;

    left:350px;
    top:200px;
}

/* DIALOGUE */

#dialogueBox{
    position:absolute;

    bottom:20px;
    left:50%;
    transform:translateX(-50%);

    width:80%;

    background:white;

    padding:25px;

    border-radius:20px;

    font-size:24px;

    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<!-- HOME -->

<button class="home-btn hidden"
id="homeBtn"
onclick="goHome()">

Home

</button>

<!-- LOGIN -->

<div class="center" id="loginScreen">

<div class="card">

<h1>Welcome to Nexar</h1>

<div class="top-buttons">

<button class="blue"
onclick="showLogin()">

Login

</button>

<button class="blue"
onclick="showSignup()">

Sign Up

</button>

</div>

<!-- LOGIN FORM -->

<div id="loginForm">

<input type="text"
id="loginUser"
placeholder="Username">

<input type="password"
id="loginPass"
placeholder="Password">

<button class="green"
onclick="login()">

Login

</button>

</div>

<!-- SIGNUP FORM -->

<div id="signupForm"
class="hidden">

<input type="text"
id="signupUser"
placeholder="Create Username">

<input type="password"
id="signupPass"
placeholder="Create Password">

<button class="green"
onclick="signup()">

Create Account

</button>

</div>

</div>

</div>

<!-- GAME -->

<div id="gameScreen"
class="hidden">

<div class="house-floor">

<!-- PLAYER -->

<div id="player"></div>

<!-- DAD -->

<div id="dad"></div>

<!-- DIALOGUE -->

<div id="dialogueBox">

Press SPACE near Dad to talk.

</div>

</div>

</div>

<script>

/* BAD WORDS */

const bannedWords = [

"fuck",
"fucker",
"fucking",
"shit",
"bitch",
"asshole",
"porn",
"sex",
"nude",
"dick",
"penis",
"vagina",
"niga",
"nigga"

];

/* LOGIN */

function showSignup(){

document.getElementById("signupForm")
.classList.remove("hidden");

document.getElementById("loginForm")
.classList.add("hidden");

}

function showLogin(){

document.getElementById("loginForm")
.classList.remove("hidden");

document.getElementById("signupForm")
.classList.add("hidden");

}

/* SIGNUP */

function signup(){

let username =
document.getElementById("signupUser")
.value.trim();

let password =
document.getElementById("signupPass")
.value.trim();

if(username === "" || password === ""){

alert("Fill everything");
return;

}

/* BAD WORD CHECK */

for(let word of bannedWords){

if(
username.toLowerCase().includes(word)
||
password.toLowerCase().includes(word)
){

alert("Use appropriate username and password");
return;

}

}

/* SAVE ACCOUNT */

let account = {
password: password
};

localStorage.setItem(
username,
JSON.stringify(account)
);

localStorage.setItem(
"loggedIn",
username
);

startGame();

}

/* LOGIN */

function login(){

let username =
document.getElementById("loginUser")
.value.trim();

let password =
document.getElementById("loginPass")
.value.trim();

let account =
localStorage.getItem(username);

if(!account){

alert("Account not found");
return;

}

account = JSON.parse(account);

if(password !== account.password){

alert("Wrong password");
return;

}

localStorage.setItem(
"loggedIn",
username
);

startGame();

}

/* START GAME */

function startGame(){

hideAll();

document.getElementById("gameScreen")
.classList.remove("hidden");

document.getElementById("homeBtn")
.classList.remove("hidden");

}

/* HOME */

function goHome(){

hideAll();

document.getElementById("loginScreen")
.classList.remove("hidden");

document.getElementById("homeBtn")
.classList.add("hidden");

}

/* HIDE */

function hideAll(){

document.getElementById("loginScreen")
.classList.add("hidden");

document.getElementById("gameScreen")
.classList.add("hidden");

}

/* AUTO LOGIN */

window.onload = function(){

let loggedIn =
localStorage.getItem("loggedIn");

if(loggedIn){

startGame();

}

};

/* MOVEMENT */

let player =
document.getElementById("player");

let x = 120;
let y = 300;

document.addEventListener("keydown", function(e){

if(document.getElementById("gameScreen")
.classList.contains("hidden")) return;

if(e.key === "ArrowUp"){
y -= 10;
}

if(e.key === "ArrowDown"){
y += 10;
}

if(e.key === "ArrowLeft"){
x -= 10;
}

if(e.key === "ArrowRight"){
x += 10;
}

player.style.left = x + "px";
player.style.top = y + "px";

/* TALK TO DAD */

if(e.key === " "){

talkToDad();

}

});

/* DAD DIALOGUE */

function talkToDad(){

let dadX = 350;
let dadY = 200;

let distance =
Math.abs(x - dadX)
+
Math.abs(y - dadY);

if(distance < 120){

let username =
localStorage.getItem("loggedIn");

document.getElementById("dialogueBox")
.innerText =

`Hey, ${username}! Are you ready to begin your adventure?

Go visit Professor Harvey in his laboratory to choose your starter pet!`;

}

}

</script>

</body>
</html>
