<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexar</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#9fe3f5;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* HOME BUTTON */

.home-button{
  position:fixed;
  top:20px;
  left:20px;
  background:#ff8c42;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:12px;
  cursor:pointer;
  z-index:1000;
}

.hidden{
  display:none;
}

.container{
  width:100%;
  max-width:700px;
}

/* CARDS */

.card{
  background:#f5ead7;
  padding:40px;
  border-radius:20px;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

h1{
  text-align:center;
  margin-bottom:30px;
  color:#333;
}

/* BUTTONS */

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  margin-bottom:12px;
  font-size:18px;
  cursor:pointer;
}

.main-button{
  background:#35b87f;
  color:white;
}

.switch-button{
  background:#4da6ff;
  color:white;
}

.google{
  background:white;
  border:2px solid #ddd;
}

/* INPUTS */

input{
  width:100%;
  padding:15px;
  margin-bottom:15px;
  border:none;
  border-radius:12px;
  font-size:16px;
}

/* TOP BUTTONS */

.top-buttons{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

/* BATTLE SCREEN */

.battle-screen{
  background:#7fd0e8;
  width:100%;
  height:650px;
  border-radius:20px;
  position:relative;
  overflow:hidden;
}

/* ENEMY */

.enemy{
  position:absolute;
  top:60px;
  right:80px;
  text-align:center;
}

.enemy img{
  width:180px;
}

.enemy-health{
  background:red;
  width:180px;
  height:20px;
  border-radius:10px;
  margin-top:10px;
}

/* PLAYER */

.player{
  position:absolute;
  bottom:180px;
  left:80px;
  text-align:center;
}

.player img{
  width:180px;
}

.player-health{
  background:green;
  width:180px;
  height:20px;
  border-radius:10px;
  margin-top:10px;
}

/* QUESTION BOX */

.question-box{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  background:#f5ead7;
  padding:25px;
  border-top:5px solid #333;
}

.question-text{
  font-size:28px;
  margin-bottom:20px;
  font-weight:bold;
}

.answer-row{
  display:flex;
  gap:10px;
}

.answer-row input{
  flex:1;
  margin-bottom:0;
}

.answer-row button{
  width:180px;
  margin-bottom:0;
}

</style>
</head>

<body>

<button class="home-button hidden"
        id="homeBtn"
        onclick="goHome()">

Home

</button>

<div class="container">

<!-- LOGIN SCREEN -->

<div class="card" id="authScreen">

<h1>Welcome to Nexar</h1>

<div class="top-buttons">

<button class="switch-button"
        onclick="showLogin()">

Login

</button>

<button class="switch-button"
        onclick="showSignup()">

Sign Up

</button>

</div>

<!-- LOGIN -->

<div id="loginForm">

<input type="text"
       id="loginUser"
       placeholder="Username">

<input type="password"
       id="loginPass"
       placeholder="Password">

<button class="main-button"
        onclick="login()">

Login

</button>

</div>

<!-- SIGNUP -->

<div id="signupForm" class="hidden">

<input type="text"
       id="signupUser"
       placeholder="Create Username">

<input type="password"
       id="signupPass"
       placeholder="Create Password">

<button class="main-button"
        onclick="signup()">

Create Account

</button>

</div>

<p style="text-align:center;margin:20px 0;">
Continue with Google
</p>

<button class="google"
        onclick="fakeGoogleLogin()">

Google

</button>

</div>

<!-- MODE SCREEN -->

<div class="card hidden"
     id="modeScreen">

<h1>Choose Mode</h1>

<button class="main-button"
        onclick="showGrade()">

Play At Home

</button>

<button class="main-button"
        onclick="showGrade()">

Play At School

</button>

</div>

<!-- GRADE SCREEN -->

<div class="card hidden"
     id="gradeScreen">

<h1>Select Grade</h1>

<button class="main-button"
        onclick="selectGrade('grade1')">

Grade 1

</button>

<button class="main-button"
        onclick="selectGrade('grade2')">

Grade 2

</button>

<button class="main-button"
        onclick="selectGrade('grade3')">

Grade 3

</button>

</div>

<!-- SUBJECT SCREEN -->

<div class="card hidden"
     id="subjectScreen">

<h1>Choose Subject</h1>

<button class="main-button"
        onclick="selectSubject('math')">

Math

</button>

<button class="main-button"
        onclick="selectSubject('english')">

Language Arts

</button>

<button class="main-button"
        onclick="selectSubject('science')">

Science

</button>

</div>

<!-- BATTLE SCREEN -->

<div class="battle-screen hidden"
     id="battleScreen">

<!-- ENEMY -->

<div class="enemy">

<img src="https://i.imgur.com/9Xn4F6Y.png">

<h2>Shadow Dragon</h2>

<div class="enemy-health"
     id="enemyHealth">

</div>

</div>

<!-- PLAYER -->

<div class="player">

<img src="https://i.imgur.com/Yqz8D9B.png">

<h2>Hero</h2>

<div class="player-health"
     id="playerHealth">

</div>

</div>

<!-- QUESTION AREA -->

<div class="question-box">

<div class="question-text"
     id="questionText">

Question Here

</div>

<div class="answer-row">

<input type="text"
       id="answerInput"
       placeholder="Type answer...">

<button class="main-button"
        onclick="checkAnswer()">

Attack

</button>

</div>

</div>

</div>

</div>

<script src="questions.js"></script>

<script>

let selectedGrade = "";
let selectedSubject = "";
let currentQuestion = null;

let enemyHP = 100;
let playerHP = 100;

/* BAD WORDS */

const bannedWords = [
  "sex",
  "hate",
  "kill",
  "badword"
];

/* AUTO LOGIN */

window.onload = function(){

  let loggedIn =
    localStorage.getItem("loggedIn");

  if(loggedIn === "true"){

    showMode();

  }

}

/* LOGIN / SIGNUP */

function showSignup(){

  document.getElementById("loginForm")
    .classList.add("hidden");

  document.getElementById("signupForm")
    .classList.remove("hidden");

}

function showLogin(){

  document.getElementById("signupForm")
    .classList.add("hidden");

  document.getElementById("loginForm")
    .classList.remove("hidden");

}

/* SIGNUP */

function signup(){

  let username =
    document.getElementById("signupUser")
    .value
    .toLowerCase();

  let password =
    document.getElementById("signupPass")
    .value;

  if(username === "" || password === ""){

    alert("Fill everything out.");

    return;

  }

  for(let word of bannedWords){

    if(username.includes(word)){

      alert("Inappropriate username.");

      return;

    }

  }

  let existingUser =
    localStorage.getItem("username");

  if(username === existingUser){

    alert("Username already exists.");

    return;

  }

  localStorage.setItem("username", username);

  localStorage.setItem("password", password);

  localStorage.setItem("loggedIn", "true");

  showMode();

}

/* LOGIN */

function login(){

  let username =
    document.getElementById("loginUser")
    .value
    .toLowerCase();

  let password =
    document.getElementById("loginPass")
    .value;

  let savedUser =
    localStorage.getItem("username");

  let savedPass =
    localStorage.getItem("password");

  if(username === savedUser &&
     password === savedPass){

    localStorage.setItem("loggedIn", "true");

    showMode();

  }

  else{

    alert("Wrong username or password");

  }

}

/* GOOGLE */

function fakeGoogleLogin(){

  alert("Google Login Coming Soon!");

}

/* MODE */

function showMode(){

  hideAll();

  document.getElementById("modeScreen")
    .classList.remove("hidden");

  document.getElementById("homeBtn")
    .classList.remove("hidden");

}

/* GRADE */

function showGrade(){

  hideAll();

  document.getElementById("gradeScreen")
    .classList.remove("hidden");

}

/* SELECT GRADE */

function selectGrade(grade){

  selectedGrade = grade;

  hideAll();

  document.getElementById("subjectScreen")
    .classList.remove("hidden");

}

/* SUBJECT */

function selectSubject(subject){

  selectedSubject = subject;

  startBattle();

}

/* START BATTLE */

function startBattle(){

  hideAll();

  document.getElementById("battleScreen")
    .classList.remove("hidden");

  let questionList =
    questions[selectedGrade][selectedSubject];

  currentQuestion = questionList[0];

  document.getElementById("questionText")
    .innerText =
    currentQuestion.question;

}

/* CHECK ANSWER */

function checkAnswer(){

  let answer =
    document.getElementById("answerInput")
    .value
    .toLowerCase();

  let correct =
    currentQuestion.answer
    .toLowerCase();

  if(answer === correct){

    enemyHP -= 25;

    if(enemyHP < 0){

      enemyHP = 0;

    }

    document.getElementById("enemyHealth")
      .style.width =
      enemyHP + "%";

    alert("Correct Attack!");

  }

  else{

    playerHP -= 25;

    if(playerHP < 0){

      playerHP = 0;

    }

    document.getElementById("playerHealth")
      .style.width =
      playerHP + "%";

    alert("Wrong Answer!");

  }

  document.getElementById("answerInput")
    .value = "";

}

/* HOME */

function goHome(){

  hideAll();

  document.getElementById("authScreen")
    .classList.remove("hidden");

  document.getElementById("homeBtn")
    .classList.add("hidden");

  localStorage.setItem("loggedIn", "false");

}

/* HIDE ALL */

function hideAll(){

  document.getElementById("authScreen")
    .classList.add("hidden");

  document.getElementById("modeScreen")
    .classList.add("hidden");

  document.getElementById("gradeScreen")
    .classList.add("hidden");

  document.getElementById("subjectScreen")
    .classList.add("hidden");

  document.getElementById("battleScreen")
    .classList.add("hidden");

}

</script>

</body>
</html>
