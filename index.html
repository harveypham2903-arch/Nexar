<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexar</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#9fe3f5;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:500px;
  position:relative;
}

.card{
  background:#f5ead7;
  padding:40px;
  border-radius:20px;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

h1{
  text-align:center;
  font-size:40px;
  margin-bottom:30px;
  color:#333;
}

.top-buttons{
  display:flex;
  gap:10px;
  margin-bottom:25px;
}

.top-buttons button{
  flex:1;
}

input{
  width:100%;
  padding:15px;
  margin-bottom:15px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
}

.main-button{
  background:#35b87f;
  color:white;
  margin-bottom:12px;
}

.main-button:hover{
  background:#2ea16f;
}

.switch-button{
  background:#4da6ff;
  color:white;
}

.switch-button:hover{
  background:#2c8cff;
}

.google{
  background:white;
  color:#333;
  border:2px solid #ddd;
}

.google:hover{
  background:#f1f1f1;
}

.social-title{
  text-align:center;
  margin-bottom:15px;
  color:#555;
}

.hidden{
  display:none;
}

.home-button{
  position:fixed;
  top:20px;
  left:20px;
  width:auto;
  padding:12px 18px;
  background:#ff8c42;
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  z-index:1000;
}

.home-button:hover{
  background:#ff741f;
}

.mode-buttons button,
.grade-buttons button,
.subject-buttons button{
  margin-bottom:12px;
}

</style>
</head>

<body>

<!-- HOME BUTTON -->

<button class="home-button hidden" id="homeBtn" onclick="goHome()">
  Home
</button>

<div class="container">

  <!-- LOGIN / SIGNUP SCREEN -->

  <div class="card" id="authScreen">

    <h1>Welcome to Nexar</h1>

    <div class="top-buttons">

      <button class="switch-button" onclick="showLogin()">
        Login
      </button>

      <button class="switch-button" onclick="showSignup()">
        Sign Up
      </button>

    </div>



    <!-- LOGIN FORM -->

    <div id="loginForm">

      <input type="text" id="loginUser" placeholder="Username">

      <input type="password" id="loginPass" placeholder="Password">

      <button class="main-button" onclick="login()">
        Login
      </button>

    </div>



    <!-- SIGNUP FORM -->

    <div id="signupForm" class="hidden">

      <input type="text" id="signupUser" placeholder="Create Username">

      <input type="password" id="signupPass" placeholder="Create Password">

      <button class="main-button" onclick="signup()">
        Sign Up
      </button>

    </div>



    <p class="social-title">
      Continue with Google
    </p>

    <button class="google" onclick="fakeGoogleLogin()">
      Google
    </button>

  </div>



  <!-- MODE SCREEN -->

  <div class="card hidden" id="modeScreen">

    <h1>Choose Mode</h1>

    <div class="mode-buttons">

      <button class="main-button" onclick="showGrade()">
        Play At Home
      </button>

      <button class="main-button" onclick="showGrade()">
        Play At School
      </button>

    </div>

  </div>



  <!-- GRADE SCREEN -->

  <div class="card hidden" id="gradeScreen">

    <h1>Select Grade</h1>

    <div class="grade-buttons">

      <button class="main-button" onclick="selectGrade('grade1')">
        Grade 1
      </button>

      <button class="main-button" onclick="selectGrade('grade2')">
        Grade 2
      </button>

      <button class="main-button" onclick="selectGrade('grade3')">
        Grade 3
      </button>

    </div>

  </div>



  <!-- SUBJECT SCREEN -->

  <div class="card hidden" id="subjectScreen">

    <h1>Choose Subject</h1>

    <div class="subject-buttons">

      <button class="main-button" onclick="selectSubject('math')">
        Math
      </button>

      <button class="main-button" onclick="selectSubject('english')">
        Language Arts
      </button>

      <button class="main-button" onclick="selectSubject('science')">
        Science
      </button>

    </div>

  </div>

</div>

<script src="questions.js"></script>
<script src="script.js"></script>

</body>
</html>
