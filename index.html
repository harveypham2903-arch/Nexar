<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexar</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#9fe3f5;
    min-height:100vh;
}

/* HOME BUTTON */

.home-btn{
    position:fixed;
    top:15px;
    left:15px;
    padding:10px 16px;
    border:none;
    border-radius:10px;
    background:#ff8c42;
    color:white;
    cursor:pointer;
    font-size:16px;
    z-index:1000;
}

.home-btn:hover{
    background:#ff741f;
}

/* CENTER */

.center{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* CARD */

.card{
    background:#f5ead7;
    width:100%;
    max-width:500px;
    padding:40px;
    border-radius:25px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:25px;
    font-size:42px;
    color:#333;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

.green{
    background:#35b87f;
    color:white;
    margin-bottom:12px;
}

.green:hover{
    background:#2ea16f;
}

.blue{
    background:#4da6ff;
    color:white;
    margin-bottom:12px;
}

.hidden{
    display:none;
}

.top-buttons{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.top-buttons button{
    flex:1;
}

/* BATTLE */

.battle-screen{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
}

.battle-top{
    flex:1;
    position:relative;
    padding:40px;
}

/* PLAYER */

.player{
    position:absolute;
    left:80px;
    bottom:40px;
    text-align:center;
}

.player img{
    width:180px;
}

/* ENEMY */

.enemy{
    position:absolute;
    right:80px;
    top:40px;
    text-align:center;
}

.enemy img{
    width:180px;
}

/* HP */

.hp-bar{
    width:160px;
    height:20px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin-top:10px;
}

.hp-fill{
    height:100%;
    background:green;
}

/* QUESTION BOX */

.question-box{
    background:#f5ead7;
    padding:30px;
    border-top:5px solid #333;
}

.question{
    font-size:40px;
    margin-bottom:20px;
    font-weight:bold;
}

.answer-row{
    display:flex;
    gap:10px;
}

.answer-row input{
    margin-bottom:0;
}

.answer-row button{
    width:200px;
}

</style>
</head>

<body>

<button class="home-btn hidden" id="homeBtn" onclick="goHome()">
Home
</button>

<div class="center">

<!-- LOGIN -->

<div class="card" id="loginScreen">

<h1>Welcome to Nexar</h1>

<div class="top-buttons">
<button class="blue" onclick="showLogin()">Login</button>
<button class="blue" onclick="showSignup()">Sign Up</button>
</div>

<!-- LOGIN FORM -->

<div id="loginForm">

<input type="text" id="loginUser" placeholder="Username">

<input type="password" id="loginPass" placeholder="Password">

<button class="green" onclick="login()">
Login
</button>

</div>

<!-- SIGNUP FORM -->

<div id="signupForm" class="hidden">

<input type="text" id="signupUser" placeholder="Create Username">

<input type="password" id="signupPass" placeholder="Create Password">

<button class="green" onclick="signup()">
Create Account
</button>

</div>

</div>

<!-- MODE -->

<div class="card hidden" id="modeScreen">

<h1>Choose Mode</h1>

<button class="green" onclick="showGrades()">
Home Mode
</button>

<button class="green" onclick="showGrades()">
School Mode
</button>

</div>

<!-- GRADES -->

<div class="card hidden" id="gradeScreen">

<h1>Select Grade</h1>

<button class="green" onclick="selectGrade(1)">Grade 1</button>
<button class="green" onclick="selectGrade(2)">Grade 2</button>
<button class="green" onclick="selectGrade(3)">Grade 3</button>
<button class="green" onclick="selectGrade(4)">Grade 4</button>
<button class="green" onclick="selectGrade(5)">Grade 5</button>
<button class="green" onclick="selectGrade(6)">Grade 6</button>

</div>

<!-- SUBJECTS -->

<div class="card hidden" id="subjectScreen">

<h1>Choose Subject</h1>

<button class="green" onclick="startBattle('math')">
Math
</button>

<button class="green" onclick="startBattle('english')">
Language Arts
</button>

<button class="green" onclick="startBattle('science')">
Science
</button>

</div>

</div>

<!-- BATTLE SCREEN -->

<div class="battle-screen hidden" id="battleScreen">

<div class="battle-top">

<!-- PLAYER -->

<div class="player">

<img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">

<h2>Hero</h2>

<div class="hp-bar">
<div class="hp-fill" id="playerHP" style="width:100%;"></div>
</div>

</div>

<!-- ENEMY -->

<div class="enemy">

<img src="https://cdn-icons-png.flaticon.com/512/188/188987.png">

<h2>Shadow Dragon</h2>

<div class="hp-bar">
<div class="hp-fill" id="enemyHP" style="width:100%;"></div>
</div>

</div>

</div>

<!-- QUESTION -->

<div class="question-box">

<div class="question" id="questionText">
2 + 2
</div>

<div class="answer-row">

<input type="text" id="answerInput" placeholder="Type answer...">

<button class="green" onclick="checkAnswer()">
Attack
</button>

</div>

</div>

</div>

<script>

/* BAD WORDS */

const bannedWords = [
"fuck",
"shit",
"bitch",
"ass",
"sex",
"nude",
"fucker"
];

/* LOGIN */

function showSignup(){
document.getElementById("signupForm").classList.remove("hidden");
document.getElementById("loginForm").classList.add("hidden");
}

function showLogin(){
document.getElementById("loginForm").classList.remove("hidden");
document.getElementById("signupForm").classList.add("hidden");
}

/* SIGNUP */

function signup(){

let username =
document.getElementById("signupUser").value.trim();

let password =
document.getElementById("signupPass").value.trim();

if(username === "" || password === ""){
alert("Fill everything");
return;
}

/* BAD WORD CHECK */

for(let word of bannedWords){

if(username.toLowerCase().includes(word) ||
password.toLowerCase().includes(word)){

alert("Use appropriate username and password");
return;

}

}

/* ACCOUNT EXISTS */

if(localStorage.getItem(username)){
alert("Username already exists");
return;
}

/* SAVE */

let account = {
password: password
};

localStorage.setItem(username, JSON.stringify(account));

localStorage.setItem("loggedIn", username);

alert("Account created!");

showMode();

}

/* LOGIN */

function login(){

let username =
document.getElementById("loginUser").value.trim();

let password =
document.getElementById("loginPass").value.trim();

let account =
localStorage.getItem(username);

if(!account){
alert("Account not found");
return;
}

account = JSON.parse(account);

if(password !== account.password){
alert("Wrong password");
return;
}

localStorage.setItem("loggedIn", username);

showMode();

}

/* MODE */

function showMode(){

hideAll();

document.getElementById("modeScreen")
.classList.remove("hidden");

document.getElementById("homeBtn")
.classList.remove("hidden");

}

/* GRADES */

function showGrades(){

hideAll();

document.getElementById("gradeScreen")
.classList.remove("hidden");

}

let currentGrade = 1;

function selectGrade(grade){

currentGrade = grade;

hideAll();

document.getElementById("subjectScreen")
.classList.remove("hidden");

}

/* QUESTIONS */

let currentAnswer = 0;
let enemyHealth = 100;
let playerHealth = 100;

function startBattle(subject){

hideAll();

document.getElementById("battleScreen")
.classList.remove("hidden");

generateQuestion(subject);

}

/* QUESTION GENERATOR */

function generateQuestion(subject){

let question = "";

if(subject === "math"){

if(currentGrade <= 2){

let a = Math.floor(Math.random()*10);
let b = Math.floor(Math.random()*10);

question = `${a} + ${b}`;
currentAnswer = a + b;

}

else if(currentGrade <= 4){

let a = Math.floor(Math.random()*50);
let b = Math.floor(Math.random()*20);

question = `${a} - ${b}`;
currentAnswer = a - b;

}

else{

let a = Math.floor(Math.random()*12);
let b = Math.floor(Math.random()*12);

question = `${a} × ${b}`;
currentAnswer = a * b;

}

}

if(subject === "english"){

question = "What is a noun?";
currentAnswer = "person";

}

if(subject === "science"){

question = "What planet do we live on?";
currentAnswer = "earth";

}

document.getElementById("questionText")
.innerText = question;

}

/* CHECK ANSWER */

function checkAnswer(){

let input =
document.getElementById("answerInput")
.value.trim().toLowerCase();

if(input == currentAnswer){

enemyHealth -= 20;

if(enemyHealth < 0){
enemyHealth = 0;
}

document.getElementById("enemyHP")
.style.width = enemyHealth + "%";

alert("Correct! Attack hit!");

}else{

playerHealth -= 20;

if(playerHealth < 0){
playerHealth = 0;
}

document.getElementById("playerHP")
.style.width = playerHealth + "%";

alert("Wrong answer!");

}

document.getElementById("answerInput").value = "";

if(enemyHealth <= 0){

alert("You won!");

enemyHealth = 100;
playerHealth = 100;

document.getElementById("enemyHP")
.style.width = "100%";

document.getElementById("playerHP")
.style.width = "100%";

showSubjects();

return;

}

if(playerHealth <= 0){

alert("You lost!");

enemyHealth = 100;
playerHealth = 100;

document.getElementById("enemyHP")
.style.width = "100%";

document.getElementById("playerHP")
.style.width = "100%";

showSubjects();

return;

}

generateQuestion("math");

}

/* HOME */

function goHome(){

localStorage.removeItem("loggedIn");

hideAll();

document.getElementById("loginScreen")
.classList.remove("hidden");

document.getElementById("homeBtn")
.classList.add("hidden");

}

/* HIDE */

function hideAll(){

document.getElementById("loginScreen")
.classList.add("hidden");

document.getElementById("modeScreen")
.classList.add("hidden");

document.getElementById("gradeScreen")
.classList.add("hidden");

document.getElementById("subjectScreen")
.classList.add("hidden");

document.getElementById("battleScreen")
.classList.add("hidden");

}

/* AUTO LOGIN */

window.onload = function(){

let loggedIn = localStorage.getItem("loggedIn");

if(loggedIn){

showMode();

}

}

</script>

</body>
</html>
