<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexar</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#9fe3f5;
    overflow:hidden;
}

/* LOGIN */

.screen{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:#f5ead7;
    padding:40px;
    border-radius:20px;
    width:400px;
    box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.card h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    border:none;
    cursor:pointer;
}

.main-btn{
    width:100%;
    padding:15px;
    background:#35b87f;
    color:white;
    border-radius:10px;
    font-size:18px;
    margin-bottom:10px;
}

.switch-btn{
    width:100%;
    padding:12px;
    background:#4da6ff;
    color:white;
    border-radius:10px;
    margin-bottom:10px;
}

/* HOME BUTTON */

#homeButton{
    position:fixed;
    top:15px;
    left:15px;
    padding:10px 18px;
    background:#ff8c42;
    color:white;
    border-radius:12px;
    z-index:999;
    display:none;
}

/* GAME */

#gameScreen{
    display:none;
    width:100vw;
    height:100vh;
    position:relative;
    background:#d9b382;
}

/* HOUSE */

.house{
    position:absolute;
    width:420px;
    height:300px;
    background:#d9965b;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    border:8px solid #8b5a2b;
}

.floor{
    position:absolute;
    width:100%;
    height:100%;
    background:#d9b382;
}

.door{
    position:absolute;
    width:70px;
    height:120px;
    background:#5b3a1e;
    bottom:0;
    left:170px;
}

.dad{
    position:absolute;
    width:55px;
    height:80px;
    left:90px;
    top:120px;
}

/* DAD */

.dad-head{
    width:35px;
    height:35px;
    background:#f1c27d;
    border-radius:50%;
    margin:auto;
}

.dad-body{
    width:40px;
    height:45px;
    background:#3b82f6;
    margin:auto;
    border-radius:10px;
}

/* PLAYER */

.player{
    position:absolute;
    width:55px;
    height:85px;
    left:250px;
    top:180px;
}

.head{
    width:34px;
    height:34px;
    background:#8d5524;
    border-radius:50%;
    margin:auto;
    position:relative;
}

.hair{
    width:38px;
    height:18px;
    background:black;
    border-radius:20px 20px 5px 5px;
    position:absolute;
    top:-4px;
    left:-2px;
}

.body{
    width:42px;
    height:48px;
    background:red;
    margin:auto;
    border-radius:10px;
    position:relative;
}

.body::after{
    content:'';
    position:absolute;
    width:10px;
    height:48px;
    background:white;
    left:16px;
}

.legs{
    width:42px;
    height:18px;
    margin:auto;
    display:flex;
    justify-content:space-between;
}

.leg{
    width:14px;
    height:18px;
    background:#2563eb;
}

/* DIALOG */

.dialog{
    position:absolute;
    width:70%;
    left:15%;
    bottom:20px;
    background:white;
    padding:25px;
    border-radius:20px;
    font-size:28px;
    line-height:1.6;
    box-shadow:0 5px 12px rgba(0,0,0,0.3);
}

.space{
    margin-top:15px;
    color:gray;
    font-size:18px;
}

/* CHARACTER */

.choice-container{
    display:flex;
    gap:20px;
    justify-content:center;
    margin-top:20px;
}

.choice{
    width:120px;
    height:120px;
    background:white;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    cursor:pointer;
}

/* HIDDEN */

.hidden{
    display:none;
}

</style>
</head>

<body>

<!-- HOME BUTTON -->

<button id="homeButton" onclick="goHome()">
Home
</button>

<!-- LOGIN SCREEN -->

<div class="screen" id="loginScreen">

<div class="card">

<h1>Welcome to Nexar</h1>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button class="main-btn" onclick="login()">
Login
</button>

<button class="switch-btn" onclick="signup()">
Sign Up
</button>

</div>

</div>

<!-- MODE SCREEN -->

<div class="screen hidden" id="modeScreen">

<div class="card">

<h1>Choose Mode</h1>

<button class="main-btn" onclick="selectMode()">
Home Mode
</button>

<button class="main-btn" onclick="selectMode()">
School Mode
</button>

</div>

</div>

<!-- GRADE SCREEN -->

<div class="screen hidden" id="gradeScreen">

<div class="card">

<h1>Select Grade</h1>

<button class="main-btn" onclick="chooseGrade(1)">Grade 1</button>
<button class="main-btn" onclick="chooseGrade(2)">Grade 2</button>
<button class="main-btn" onclick="chooseGrade(3)">Grade 3</button>
<button class="main-btn" onclick="chooseGrade(4)">Grade 4</button>
<button class="main-btn" onclick="chooseGrade(5)">Grade 5</button>
<button class="main-btn" onclick="chooseGrade(6)">Grade 6</button>

</div>

</div>

<!-- CHARACTER CREATOR -->

<div class="screen hidden" id="characterScreen">

<div class="card">

<h1>Choose Character</h1>

<div class="choice-container">

<div class="choice" onclick="startGame('boy')">
Boy
</div>

<div class="choice" onclick="startGame('girl')">
Girl
</div>

</div>

</div>

</div>

<!-- GAME -->

<div id="gameScreen">

<div class="house">

<div class="floor"></div>

<div class="door"></div>

<!-- DAD -->

<div class="dad">

<div class="dad-head"></div>

<div class="dad-body"></div>

</div>

<!-- PLAYER -->

<div class="player" id="player">

<div class="head">

<div class="hair"></div>

</div>

<div class="body"></div>

<div class="legs">

<div class="leg"></div>
<div class="leg"></div>

</div>

</div>

</div>

<!-- DIALOG -->

<div class="dialog" id="dialogBox">

<p id="dialogText">
Hey Player! Are you ready to begin your adventure?
Go visit Professor Harvey in his laboratory to choose your starter pet!
</p>

<div class="space">
Press SPACE to continue
</div>

</div>

</div>

<script>

/* BAD WORDS */

const badWords = [
"fuck","bitch","shit","asshole","fucker"
];

/* LOGIN */

function signup(){

let user = document.getElementById("username").value.trim();
let pass = document.getElementById("password").value.trim();

if(user === "" || pass === ""){
alert("Fill everything.");
return;
}

let lowerUser = user.toLowerCase();

for(let word of badWords){

if(lowerUser.includes(word)){
alert("Inappropriate username.");
return;
}

}

if(localStorage.getItem(user)){
alert("Account already exists.");
return;
}

localStorage.setItem(user, pass);
localStorage.setItem("currentUser", user);

showMode();

}

function login(){

let user = document.getElementById("username").value.trim();
let pass = document.getElementById("password").value.trim();

let savedPass = localStorage.getItem(user);

if(savedPass === pass){

localStorage.setItem("currentUser", user);

showMode();

}else{

alert("Wrong username or password.");

}

}

/* MODE */

function showMode(){

document.getElementById("loginScreen").classList.add("hidden");

document.getElementById("modeScreen").classList.remove("hidden");

}

/* GRADE */

function selectMode(){

document.getElementById("modeScreen").classList.add("hidden");

document.getElementById("gradeScreen").classList.remove("hidden");

}

function chooseGrade(grade){

localStorage.setItem("grade", grade);

document.getElementById("gradeScreen").classList.add("hidden");

document.getElementById("characterScreen").classList.remove("hidden");

}

/* START GAME */

function startGame(type){

document.getElementById("characterScreen").classList.add("hidden");

document.getElementById("gameScreen").style.display = "block";

document.getElementById("homeButton").style.display = "block";

}

/* HOME */

function goHome(){

document.getElementById("gameScreen").style.display = "none";

document.getElementById("modeScreen").classList.add("hidden");

document.getElementById("gradeScreen").classList.add("hidden");

document.getElementById("characterScreen").classList.add("hidden");

document.getElementById("loginScreen").classList.remove("hidden");

document.getElementById("homeButton").style.display = "none";

}

/* SPACE */

document.addEventListener("keydown", function(e){

if(e.code === "Space"){

document.getElementById("dialogBox").style.display = "none";

}

});

</script>

</body>
</html>
